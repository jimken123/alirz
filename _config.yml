---
#-------------------------------
# General Site Settings
title: Foo Bar
logo: # You can add own logo. For example '/images/logo.png'.
description: Passionateitect, Entrepreneur, and Coffee Enthusiast
baseurl: "/alirz" # the subpath of your site, e.g. /blog
url: "https://bookmonkeys.github.io" # the base hostname & protocol for your site, e.g. http://example.com

#-------------------------------
# Author Settings
author:
  name: Ali Raza
  bio: As a thorough software architect, I bring precision and passion to every software project I tackle. My goal is to always produce innovative and high-quality software that pushes the boundaries of what's possible. I have a love for experimenting with new programming languages, and you can catch me blogging about my experience and insights in the software development world. Join me in my journey as I explore the ever-evolving world of technology and programming.
  avatar: "/images/743962.jpeg"

#-------------------------------
# Hero Settings
hero:
  hero__title: I am stuff.
  hero__description: As a detail-oriented software architect, I bring precision and passion to every project I tackle. From building cutting-edge software to exploring the latest trends in civic tech, gaming, and 3D printing, I am always pushing the boundaries of what's possible. In my free time, I enjoy sharing my insights and experiences through my blog, giving readers a glimpse into the exciting world of tech and innovation. Let's build something cool together!
  hero__image: "/images/743962.jpeg"

#-------------------------------
# Build Settings
markdown: kramdown
permalink: /:title
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll/tagging
  - jekyll-feed
  - jekyll-seo-tag

paginate: 5
paginate_path: "/page/:num"

# Pages Path
defaults:
  - scope:
      path: "_pages"
    values:
      permalink: /:basename:output_ext

include:
  - _pages

sass:
  sass_dir: _sass
  style: compressed
